# Container image configuration
quarkus.container-image.build=true
quarkus.container-image.name=rimfrost-process-vab
quarkus.container-image.tag=latest
quarkus.container-image.group=rimfrost
quarkus.container-image.push=false

quarkus.index-dependency.rimfrost-framework-process.group-id=se.fk.rimfrost.framework.process
quarkus.index-dependency.rimfrost-framework-process.artifact-id=rimfrost-framework-process

# Packaging
# quarkus.package.jar.type=fast-jar

PROCESS_ID=vab

mp.messaging.incoming.vab-handlaggning-requests.connector=smallrye-kafka
mp.messaging.incoming.vab-handlaggning-requests.auto.offset.reset=earliest
mp.messaging.incoming.vab-handlaggning-requests.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer

mp.messaging.outgoing.handlaggning-responses.connector=smallrye-kafka
mp.messaging.outgoing.handlaggning-responses.value.serializer=org.apache.kafka.common.serialization.StringSerializer

kogito.quarkus.events.threads.queueSize=10
kogito.messaging.as-cloudevents=true

kogito.persistence.type=jdbc
kogito.persistence.proto.marshaller=false
kogito.persistence.query.timeout.millis=10000

kie.flyway.enabled=true

quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.username=${DB_USERNAME}
%prod.quarkus.datasource.password=${DB_PASSWORD}
%prod.quarkus.datasource.jdbc.url=${DB_URL}

%test.quarkus.kafka.devservices.topic-partitions.vab-handlaggning-requests=1
%test.quarkus.kafka.devservices.topic-partitions.handlaggning-responses=1
%test.quarkus.kafka.devservices.topic-partitions.rtf-maskinell-requests=1
%test.quarkus.kafka.devservices.topic-partitions.vab-rtf-maskinell-responses=1
%test.quarkus.kafka.devservices.topic-partitions.rtf-manuell-requests=1
%test.quarkus.kafka.devservices.topic-partitions.vab-rtf-manuell-responses=1
%test.quarkus.kafka.devservices.topic-partitions.bekraftabeslut-requests=1
%test.quarkus.kafka.devservices.topic-partitions.vab-bekraftabeslut-responses=1