# Container image configuration
quarkus.container-image.build=true
quarkus.container-image.name=rimfrost-process-vab
quarkus.container-image.tag=latest
quarkus.container-image.group=rimfrost
quarkus.container-image.push=false

# Packaging
# quarkus.package.jar.type=fast-jar

mp.messaging.incoming.vab-kundbehovsflode-requests.connector=smallrye-kafka
mp.messaging.incoming.vab-kundbehovsflode-requests.auto.offset.reset=earliest
mp.messaging.incoming.vab-kundbehovsflode-requests.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer

mp.messaging.outgoing.vab-kundbehovsflode-responses.connector=smallrye-kafka
mp.messaging.outgoing.vab-kundbehovsflode-responses.value.serializer=org.apache.kafka.common.serialization.StringSerializer

mp.messaging.incoming.rtf-maskinell-responses.connector=smallrye-kafka
mp.messaging.incoming.rtf-maskinell-responses.auto.offset.reset=earliest
mp.messaging.incoming.rtf-maskinell-responses.group.id=rtf-maskinell-responses-consumer
mp.messaging.incoming.rtf-maskinell-responses.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer

mp.messaging.outgoing.rtf-maskinell-requests.connector=smallrye-kafka
mp.messaging.outgoing.rtf-maskinell-requests.value.serializer=org.apache.kafka.common.serialization.StringSerializer

mp.messaging.incoming.rtf-manuell-responses.connector=smallrye-kafka
mp.messaging.incoming.rtf-manuell-responses.auto.offset.reset=earliest
mp.messaging.incoming.rtf-manuell-responses.group.id=rtf-manuell-responses-consumer
mp.messaging.incoming.rtf-manuell-responses.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer

mp.messaging.outgoing.rtf-manuell-requests.connector=smallrye-kafka
mp.messaging.outgoing.rtf-manuell-requests.value.serializer=org.apache.kafka.common.serialization.StringSerializer

mp.messaging.incoming.bekraftabeslut-responses.connector=smallrye-kafka
mp.messaging.incoming.bekraftabeslut-responses.auto.offset.reset=earliest
mp.messaging.incoming.bekraftabeslut-responses.group.id=bekraftabeslut-responses-consumer
mp.messaging.incoming.bekraftabeslut-responses.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer

mp.messaging.outgoing.bekraftabeslut-requests.connector=smallrye-kafka
mp.messaging.outgoing.bekraftabeslut-requests.value.serializer=org.apache.kafka.common.serialization.StringSerializer

mp.messaging.incoming.beraknaersattning-responses.connector=smallrye-kafka
mp.messaging.incoming.beraknaersattning-responses.auto.offset.reset=earliest
mp.messaging.incoming.beraknaersattning-responses.group.id=beraknaersattning-responses-consumer
mp.messaging.incoming.beraknaersattning-responses.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer

mp.messaging.outgoing.beraknaersattning-requests.connector=smallrye-kafka
mp.messaging.outgoing.beraknaersattning-requests.value.serializer=org.apache.kafka.common.serialization.StringSerializer

kogito.quarkus.events.threads.queueSize=10
kogito.messaging.as-cloudevents=true